name: app-cluster (CAPH)

# Phase 2: turn the infra cluster (single-node k3s, built by infra.yml/terraform)
# into a running APP CLUSTER on Hetzner. It:
#   1. discovers the infra cluster IP from terraform state, fetches its kubeconfig
#   2. installs CAPH into the infra cluster (clusterctl init)
#   3. applies the CAPH overlay -> CAPH provisions Hetzner servers -> app cluster
#   4. installs the bootstrap addons on the app cluster: CNI (Cilium) + Hetzner CCM + CSI
#
# Runs in CI, never a laptop. Idempotent: re-runnable (clusterctl init / kubectl
# apply / helm upgrade --install / secret apply are all no-ops when unchanged).
#
# Prereq: infra.yml has applied (infra cluster + remote state exist).
# Extra secret beyond infra.yml's:
#   BEX_SSH_PRIVATE_KEY   private key matching BEX_SSH_PUBLIC_KEY (to read k3s.yaml over SSH)
#
# ⚠ Untested against a live Hetzner account — structurally correct, but chart
#   versions / values may need tuning on the first real run (see NOTE comments).

on:
  push:
    branches: [main]
    paths:
      - "infra/clusterapi/overlays/hetzner-caph/**"
      - ".github/workflows/app-cluster.yml"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
  CLUSTER_NAME: bex
  POD_CIDR: 10.244.0.0/16 # must match the overlay's clusterNetwork.pods.cidrBlocks
  CAPH_VERSION: v1.0.5 # matches how cluster.yaml was generated
  CLUSTERCTL_VERSION: v1.13.2

jobs:
  bootstrap-app-cluster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- discover the infra cluster from terraform state ---
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform init (read state only)
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.BEX_SSH_PUBLIC_KEY }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="endpoints={s3=\"${{ secrets.TF_STATE_ENDPOINT }}\"}" \
            -backend-config="access_key=${{ secrets.TF_STATE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.TF_STATE_SECRET_KEY }}"
      - name: discover infra cluster IP
        id: infra
        working-directory: infra/terraform
        run: echo "ip=$(terraform output -raw infra_server_ipv4)" >> "$GITHUB_OUTPUT"

      # --- fetch the infra cluster kubeconfig over SSH (becomes the default context) ---
      - name: fetch infra kubeconfig
        run: |
          install -m700 -d ~/.ssh ~/.kube
          printf '%s\n' "${{ secrets.BEX_SSH_PRIVATE_KEY }}" > ~/.ssh/id_bex
          chmod 600 ~/.ssh/id_bex
          IP="${{ steps.infra.outputs.ip }}"
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_bex "root@${IP}" \
            'cat /etc/rancher/k3s/k3s.yaml' \
            | sed "s#https://127.0.0.1:6443#https://${IP}:6443#" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      # --- tools ---
      - name: install clusterctl
        run: |
          curl -fsSL -o /tmp/clusterctl \
            "https://github.com/kubernetes-sigs/cluster-api/releases/download/${CLUSTERCTL_VERSION}/clusterctl-linux-amd64"
          sudo install -m755 /tmp/clusterctl /usr/local/bin/clusterctl
          clusterctl version

      # --- install CAPH into the infra cluster (idempotent) ---
      - name: clusterctl init (CAPH)
        run: clusterctl init --infrastructure "hetzner:${CAPH_VERSION}" || echo "providers already installed — continuing"
      - name: wait for CAPI/CAPH controllers
        run: |
          for ns in cert-manager capi-system caph-system; do
            kubectl -n "$ns" wait --for=condition=Available deploy --all --timeout=300s
          done

      # --- credential Secret (hcloud-only; robot keys only needed for bare-metal) ---
      - name: hetzner credential secret (infra cluster, ns default)
        run: |
          kubectl create secret generic hetzner -n default \
            --from-literal=hcloud="$HCLOUD_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      # --- apply the overlay -> CAPH provisions the app cluster ---
      - name: apply CAPH overlay
        run: kubectl apply -f infra/clusterapi/overlays/hetzner-caph/cluster.yaml
      - name: wait for app cluster control plane
        run: |
          kubectl wait --for=condition=ControlPlaneInitialized "cluster/${CLUSTER_NAME}" --timeout=1200s
          kubectl get cluster,machines -A -o wide

      # --- pull the app cluster kubeconfig; switch default context to it ---
      - name: app cluster kubeconfig
        run: |
          clusterctl get kubeconfig "$CLUSTER_NAME" > "$PWD/app.kubeconfig"
          echo "KUBECONFIG=$PWD/app.kubeconfig" >> "$GITHUB_ENV"

      # ====== addons on the APP cluster (KUBECONFIG now points at it) ======
      - name: helm repos
        run: |
          helm repo add hcloud https://charts.hetzner.cloud
          helm repo add cilium https://helm.cilium.io
          helm repo update

      # hcloud token secret the CCM + CSI both read.
      - name: hcloud secret (app cluster, ns kube-system)
        run: |
          kubectl -n kube-system create secret generic hcloud \
            --from-literal=token="$HCLOUD_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Hetzner CCM: initializes nodes (clears the cloud-provider taint) + LoadBalancers.
      # networking stays OFF because the overlay sets hcloudNetwork.enabled=false
      # (nodes talk over public IPs). NOTE: enabling the private network + CCM routes
      # is a perf/security upgrade — flip the overlay and set networking.enabled=true.
      - name: install Hetzner CCM
        run: |
          helm upgrade --install hccm hcloud/hcloud-cloud-controller-manager \
            -n kube-system

      # CNI: Cilium in tunnel mode (works without a private network / native routing).
      # NOTE: nodes communicate over public IPs here — enable WireGuard
      # (encryption.enabled=true, encryption.type=wireguard) before real traffic.
      - name: install Cilium (CNI)
        run: |
          helm upgrade --install cilium cilium/cilium -n kube-system \
            --set ipam.mode=cluster-pool \
            --set ipam.operator.clusterPoolIPv4PodCIDRList="{${POD_CIDR}}"

      # hcloud-csi: PersistentVolumes (registry volume, stateful apps like a Postgres).
      - name: install hcloud CSI
        run: |
          helm upgrade --install hcloud-csi hcloud/hcloud-csi -n kube-system

      - name: wait for app cluster nodes Ready
        run: |
          kubectl wait --for=condition=Ready node --all --timeout=600s
          kubectl get nodes -o wide

      - name: summary
        run: |
          echo "app cluster '$CLUSTER_NAME' is up. Next: deploy bex (operator + registry)"
          echo "via Argo/deploy or 'make deploy', then kubectl apply an App."
