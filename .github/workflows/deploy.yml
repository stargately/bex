name: deploy (bex via Argo)

# Phase 3: deploy the bex platform onto the app cluster via GitOps.
#   1. build + push the operator image to GHCR (linux/amd64 = Hetzner cpx)
#   2. discover the app cluster (terraform state -> infra IP -> SSH -> clusterctl kubeconfig)
#   3. install Argo CD on the app cluster (idempotent)
#   4. apply the prod app-of-apps -> Argo reconciles deploy/gitops/overlays/prod
#      (zot, opensandbox-controller, the bex operator) continuously from git
#
# After this the operator is running; deploy a user App with `kubectl apply`
# (that's the product runtime — NOT GitOps). CI-only, idempotent.
#
# Secrets: same as app-cluster.yml (HCLOUD_TOKEN, BEX_SSH_PRIVATE_KEY, TF_STATE_*).
# GITHUB_TOKEN (auto) pushes to GHCR. ⚠ Make the GHCR package public, or add an
# imagePullSecret in bex-system, so app-cluster nodes can pull the operator image.
# ⚠ If this repo is private, give Argo CD repo credentials (else it can't read git).

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "deploy/gitops/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/stargately/bex-operator
  CLUSTER_NAME: bex
  CLUSTERCTL_VERSION: v1.13.2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- 1. build + push the operator image ---
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: operator
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      # --- 2. discover the app cluster kubeconfig (same path as app-cluster.yml) ---
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false
      - name: terraform init (read state only)
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.BEX_SSH_PUBLIC_KEY }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="endpoints={s3=\"${{ secrets.TF_STATE_ENDPOINT }}\"}" \
            -backend-config="access_key=${{ secrets.TF_STATE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.TF_STATE_SECRET_KEY }}"
      - name: discover infra cluster IP
        id: infra
        working-directory: infra/terraform
        run: echo "ip=$(terraform output -raw infra_server_ipv4)" >> "$GITHUB_OUTPUT"
      - name: install clusterctl
        run: |
          curl -fsSL -o /tmp/clusterctl \
            "https://github.com/kubernetes-sigs/cluster-api/releases/download/${CLUSTERCTL_VERSION}/clusterctl-linux-amd64"
          sudo install -m755 /tmp/clusterctl /usr/local/bin/clusterctl
      - name: get app cluster kubeconfig
        run: |
          install -m700 -d ~/.ssh
          printf '%s\n' "${{ secrets.BEX_SSH_PRIVATE_KEY }}" > ~/.ssh/id_bex
          chmod 600 ~/.ssh/id_bex
          IP="${{ steps.infra.outputs.ip }}"
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_bex "root@${IP}" \
            'cat /etc/rancher/k3s/k3s.yaml' \
            | sed "s#https://127.0.0.1:6443#https://${IP}:6443#" > infra.kubeconfig
          KUBECONFIG="$PWD/infra.kubeconfig" clusterctl get kubeconfig "$CLUSTER_NAME" > "$PWD/app.kubeconfig"
          echo "KUBECONFIG=$PWD/app.kubeconfig" >> "$GITHUB_ENV"

      # --- 3. install Argo CD on the app cluster (idempotent) ---
      # --server-side: the argo install bundles CRDs (applicationsets) whose schema
      # exceeds kubectl's 256KB last-applied-config annotation limit; SSA avoids it.
      - name: install Argo CD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply --server-side --force-conflicts -n argocd \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl -n argocd rollout status deploy/argocd-repo-server --timeout=300s
          kubectl -n argocd rollout status deploy/argocd-server --timeout=300s

      # --- 3b. give Argo a read-only SSH deploy key for the private repo ---
      # The app-of-apps and the bex-operator child app source from this private
      # repo over SSH; without this credential Argo can't clone it. github.com host
      # keys ship in argocd-ssh-known-hosts-cm (part of the install), so no extra
      # known_hosts config is needed.
      - name: configure Argo repo credentials
        run: |
          printf '%s\n' "${{ secrets.ARGOCD_REPO_SSH_KEY }}" > /tmp/argo_deploy_key
          kubectl -n argocd create secret generic bex-repo \
            --from-literal=type=git \
            --from-literal=url=git@github.com:stargately/bex.git \
            --from-file=sshPrivateKey=/tmp/argo_deploy_key \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n argocd label secret bex-repo argocd.argoproj.io/secret-type=repository --overwrite
          rm -f /tmp/argo_deploy_key

      # --- 4. point Argo at the repo; it reconciles the whole platform ---
      - name: apply prod app-of-apps
        run: kubectl apply -f deploy/gitops/bootstrap/prod.yaml

      - name: wait for the bex operator
        run: |
          kubectl -n bex-system rollout status deploy/bex-controller-manager --timeout=600s \
            || { echo "operator not ready — Argo status:"; kubectl -n argocd get applications; exit 1; }
          echo "bex operator running. Deploy an App: kubectl apply -f examples/whoami-app.yaml"
