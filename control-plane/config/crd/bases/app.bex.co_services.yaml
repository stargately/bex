---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: services.app.bex.co
spec:
  group: app.bex.co
  names:
    kind: Service
    listKind: ServiceList
    plural: services
    singular: service
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.activeRevision
      name: Revision
      type: string
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .spec.repo
      name: Repo
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Service is the Schema for the services API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Service
            properties:
              autoDeploy:
                description: AutoDeploy triggers a deploy on each push to Branch.
                type: boolean
              branch:
                default: main
                description: Branch to track. Defaults to "main".
                type: string
              builder:
                default: auto
                description: |-
                  Builder selects how the image is built:
                  "auto" (Dockerfile if present, else Cloud Native Buildpacks), "buildpack", or "dockerfile".
                enum:
                - auto
                - buildpack
                - dockerfile
                type: string
              healthCheckPath:
                default: /
                description: HealthCheckPath polled for 2xx before traffic is shifted
                  to a new revision.
                type: string
              idleTTLSeconds:
                description: IdleTTLSeconds before the service hibernates ("sleep
                  = free"). 0 = controller default.
                format: int32
                type: integer
              port:
                default: 3000
                description: Port the application listens on (PORT is injected).
                format: int32
                type: integer
              repo:
                description: Repo is the git repository URL (or local path) to deploy
                  from.
                type: string
            required:
            - repo
            type: object
          status:
            description: status defines the observed state of Service
            properties:
              activeRevision:
                description: ActiveRevision currently serving traffic (e.g. "rev_5").
                type: string
              conditions:
                description: Conditions represent the current state (Ready / Progressing
                  / Degraded).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoint:
                description: Endpoint is the raw runtime target for the edge ("host:port/prefix").
                type: string
              image:
                description: Image is the OCI image of the active revision.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation the controller
                  last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level lifecycle state.
                enum:
                - Pending
                - Building
                - Deploying
                - Running
                - Hibernated
                - Failed
                type: string
              sandboxID:
                description: SandboxID is the runtime handle of the active revision
                  (OpenSandbox sandbox id).
                type: string
              url:
                description: URL is the stable serving URL (*-<id>.bex.co).
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
