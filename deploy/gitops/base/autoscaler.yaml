# Cluster Autoscaler — the reactive "add/remove machine" engine. Watches pending
# pods and scales the node pool (a Cluster API MachineDeployment) up; drains empty
# nodes and scales down. This is what makes bex's idle-evict policy turn into real
# machine scale-down ("sleep = free" at the node level).
#
# Uses the clusterapi cloudprovider so it works the same against CAPD (local) and
# CAPH (Hetzner) — it just scales MachineDeployments.
#
# PLACEHOLDER Application — wire when a git remote exists:
# apiVersion: argoproj.io/v1alpha1
# kind: Application
# metadata: { name: cluster-autoscaler, namespace: argocd }
# spec:
#   source:
#     repoURL: https://kubernetes.github.io/autoscaler
#     chart: cluster-autoscaler
#     targetRevision: "9.*"
#     helm:
#       values: |
#         cloudProvider: clusterapi
#         autoDiscovery: { clusterName: bex }
#   destination: { server: https://kubernetes.default.svc, namespace: kube-system }
#   syncPolicy: { automated: { prune: true, selfHeal: true } }
