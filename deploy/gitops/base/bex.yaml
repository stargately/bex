# The bex control plane: the kubebuilder operator (App CRD + reconcilers).
# Argo deploys it straight from operator/config/default (kustomize) into bex-system,
# overriding the placeholder `controller` image with the one CI pushes to GHCR.
#
# NOTE: the tag is mutable (:latest) so the FIRST deploy works; Argo syncs git, not
# image digests, so a new :latest push won't auto-roll. Harden with Argo Image
# Updater or have CI commit an immutable :<sha> tag here.
# NOTE: if the GHCR package is private, add an imagePullSecret in bex-system (or make
# the package public) so app-cluster nodes can pull it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bex-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/stargately/bex
    targetRevision: main
    path: operator/config/default
    kustomize:
      images:
        - controller=ghcr.io/stargately/bex-operator:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: bex-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # the App CRD is large — avoid last-applied annotation limits
