# Cluster API + provider controllers — the node-provisioning ENGINE (installed into
# the infra cluster). The desired node pools it consumes (Cluster /
# MachineDeployment) live in infra/clusterapi/ (NOT here): engine = deploy/, desired
# infrastructure = infra/.
#
# In practice this is installed once with `clusterctl init` (see infra/local/), then
# kept in GitOps. Provider is chosen per-env in the overlay: docker (CAPD) locally,
# hetzner (CAPH) in prod.
#
# PLACEHOLDER Application — wire when a git remote + clusterctl-managed manifests exist:
# apiVersion: argoproj.io/v1alpha1
# kind: Application
# metadata: { name: cluster-api, namespace: argocd }
# spec:
#   source: { repoURL: <repo>, path: infra/clusterapi/_providers, targetRevision: main }
#   destination: { server: https://kubernetes.default.svc, namespace: capi-system }
#   syncPolicy: { automated: { prune: true, selfHeal: true }, syncOptions: [CreateNamespace=true] }
