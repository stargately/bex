# CloudNativePG — the Postgres operator. Manages the bex control-plane database
# (see bex-postgres.yaml). Chosen over a plain StatefulSet / Bitnami chart for
# operator-managed lifecycle, smooth path to HA, and built-in backups to S3
# (Wasabi) for the "source of truth" durability story (docs/control-plane.md).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # operator + CRDs before the Cluster (wave 2)
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: "0.29.0" # pin exact for reproducibility
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # CNPG CRDs exceed kubectl's 256KB last-applied-config annotation limit
