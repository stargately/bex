# Traefik — the cluster edge / ingress controller. Chosen over ingress-nginx because
# the roadmap is multi-tenant BYOD (tenants add custom domains dynamically): Traefik
# routes new hosts WITHOUT a config reload, where nginx does a full reload per change.
# TLS is handled by cert-manager (see cert-manager.yaml + cert-manager-issuers.yaml),
# NOT Traefik's built-in ACME — so the operator just emits standard Ingress objects
# (ingressClassName: traefik) and the controller stays swappable.
#
# EDGE EXPOSURE — hostNetwork on the node's public IP (no Hetzner LB).
# For a single node this is the simplest, cheapest edge: Traefik runs on hostNetwork
# and binds the node's public IP :80/:443 directly (reachable, verified). Runs as root
# because the traefik binary has no file caps, so a non-root uid drops NET_BIND_SERVICE
# on exec and can't bind <1024. ClusterFirstWithHostNet keeps in-cluster API/DNS in the
# host netns. service.spec.type=ClusterIP so the Hetzner CCM does NOT create a LB.
#
# NOTE: a Hetzner LB *does* work over public IPs (no private network needed) once the
# node isn't excluded from LBs (drop the node.kubernetes.io/exclude-from-external-load-
# balancers label that kubeadm puts on control-plane nodes). UPGRADE PATH (multi-node /
# stable IP across node replacement): set service.spec.type=LoadBalancer + the
# load-balancer.hetzner.cloud/{location,use-private-ip,name} annotations; the CCM
# provisions a real LB (~EUR5/mo).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "41.0.0"           # Traefik v3; pin exact for reproducibility
    helm:
      values: |
        deployment:
          replicas: 1                  # single app node today
          dnsPolicy: ClusterFirstWithHostNet   # reach in-cluster API/DNS under hostNetwork
        hostNetwork: true              # bind the node's public IP directly (no Hetzner LB)
        # Bind :80/:443 directly. The traefik binary has no file caps, so a non-root
        # uid drops NET_BIND_SERVICE on exec -> "permission denied"; run as root with
        # only NET_BIND_SERVICE (standard for an edge proxy on privileged ports).
        podSecurityContext:
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
        securityContext:
          capabilities:
            add: [NET_BIND_SERVICE]
            drop: [ALL]
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        ports:
          web:
            port: 80                   # host :80 (HTTP + ACME HTTP-01 challenge)
          websecure:
            port: 443                  # host :443 (HTTPS)
        service:
          spec:
            type: ClusterIP            # no Hetzner LB (single-node uses hostNetwork node IP); LoadBalancer for multi-node
        ingressClass:
          enabled: true
          isDefaultClass: true
          name: traefik
        providers:
          kubernetesIngress:
            enabled: true              # watch standard networking.k8s.io/Ingress
        # entrypoints web(:80) + websecure(:443) with NO forced web->websecure redirect,
        # so cert-manager HTTP-01 challenges on :80 succeed.
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
