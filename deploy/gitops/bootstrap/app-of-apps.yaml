# Argo CD root "app-of-apps": reconciles everything under platform/.
# Apply once (after Argo CD is installed): kubectl apply -f bootstrap/app-of-apps.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bex-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/blockeden/bex # TODO: set to this repo's URL
    targetRevision: main
    path: deploy/gitops/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
