# Per-env app-of-apps entrypoint (prod). Applied once by deploy.yml after Argo CD is
# installed on the app cluster; Argo then reconciles the prod overlay = the whole
# platform (zot, opensandbox-controller, bex operator, …) continuously from git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bex-platform-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/stargately/bex
    targetRevision: main
    path: deploy/gitops/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
