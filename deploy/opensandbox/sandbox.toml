# OpenSandbox server config for bex — Docker runtime on the host OrbStack daemon.
# Runs on a dedicated port (8077) so it shares the host Docker image cache and can
# reach the local Zot registry; the dokploy-VM OpenSandbox on :8080 cannot.
# Start with: bash scripts/start-opensandbox.sh

[server]
host = "127.0.0.1"
port = 8077
max_sandbox_timeout_seconds = 86400
# No api_key -> insecure mode; start script sets OPENSANDBOX_INSECURE_SERVER=YES.

[log]
level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.16"

[storage]
allowed_host_paths = []
volume_default_size = "1Gi"

[store]
type = "sqlite"
path = "~/.opensandbox/bex.db"

[docker]
network_mode = "bridge"
drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
no_new_privileges = true
apparmor_profile = ""
pids_limit = 4096
seccomp_profile = ""

[ingress]
mode = "direct"

[egress]
image = "opensandbox/egress:v1.0.12"
mode = "dns"

[renew_intent]
enabled = false
min_interval_seconds = 60
