# Cluster API management cluster (kind). The Docker socket is mounted so the
# Cluster API Docker provider (CAPD) can create workload-cluster nodes as Docker
# containers on the host daemon.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: bex-mgmt
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
